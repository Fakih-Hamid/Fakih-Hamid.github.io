<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffd9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with subtle gradient -->
  <rect width="64" height="64" fill="#0a0e1a" rx="10"/>
  <rect x="2" y="2" width="60" height="60" fill="url(#cyberGradient)" opacity="0.05" rx="8"/>
  
  <!-- Terminal window frame -->
  <rect x="10" y="10" width="44" height="44" fill="#0a0e1a" stroke="url(#cyberGradient)" stroke-width="2.5" rx="4" filter="url(#glow)"/>
  
  <!-- Terminal header -->
  <rect x="10" y="10" width="44" height="12" fill="#1a1f2e" rx="4 4 0 0"/>
  <circle cx="18" cy="16" r="2.5" fill="#ff4444"/>
  <circle cx="24" cy="16" r="2.5" fill="#ffaa00"/>
  <circle cx="30" cy="16" r="2.5" fill="#00ff88"/>
  
  <!-- Terminal prompt and code -->
  <text x="14" y="32" font-family="monospace" font-size="7" fill="#00ffd9" filter="url(#glow)">$</text>
  <rect x="20" y="28" width="22" height="2" fill="#00ffd9" opacity="0.9" rx="1"/>
  
  <text x="14" y="42" font-family="monospace" font-size="7" fill="#00ffd9" filter="url(#glow)">&gt;</text>
  <rect x="20" y="38" width="18" height="2" fill="#00ffd9" opacity="0.7" rx="1"/>
  
  <text x="14" y="52" font-family="monospace" font-size="7" fill="#ff00ff" filter="url(#glow)">AI</text>
  <text x="22" y="52" font-family="monospace" font-size="7" fill="#ffffff" opacity="0.6">×</text>
  <text x="28" y="52" font-family="monospace" font-size="7" fill="#00ffd9" filter="url(#glow)">SEC</text>
  
  <!-- Shield icon overlay (cybersecurity symbol) -->
  <path d="M 32 18 L 38 19.5 L 38 26 Q 38 30 35 32.5 Q 32 35 29 32.5 Q 26 30 26 26 L 26 19.5 Z" 
        fill="none" stroke="#ff00ff" stroke-width="1.2" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Neural network connection (AI symbol) -->
  <circle cx="50" cy="34" r="2" fill="#00ffd9" filter="url(#glow)"/>
  <circle cx="54" cy="40" r="2" fill="#ff00ff" filter="url(#glow)"/>
  <line x1="50" y1="34" x2="54" y2="40" stroke="url(#cyberGradient)" stroke-width="1" opacity="0.6"/>
</svg>

